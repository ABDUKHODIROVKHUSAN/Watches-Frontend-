version: "3.3"

services:
  watches-frontend:
    container_name: watches-frontend
    restart: always
    image: node:20.10.0
    ports:
      - 4000:3300
  
    environment:
      - PORT=3000

    volumes:
      - ./:/usr/src/watches-frontend
    working_dir: /usr/src/watches-frontend

    networks:
      - client-network

      
  # FOR PRODUCTION
    command: bash -c "yarn install && yarn build && yarn start"

networks:
  client-network:
    driver: bridge
